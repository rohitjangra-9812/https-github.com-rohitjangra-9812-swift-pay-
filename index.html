<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>SwiftPay UPI Payment Gateway</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SwiftPay" />
    
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        console.log('Early beforeinstallprompt captured in index.html');
        // Dispatch custom event to notify React if it is already loaded
        window.dispatchEvent(new CustomEvent('appinstalledprompt', { detail: e }));
      });
    </script>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('swiftpay_theme');
          if (theme === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
